<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Shakib Uz Zaman</title>

    <!-- Icon & Font Libraries -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
        /* =======================
           RESET & BASE STYLES
        ======================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: "Inter", Arial, Helvetica, sans-serif;
            background-color: #050505;
            background-image: radial-gradient(#1f1f1f 1px, transparent 1px);
            background-size: 22px 22px;
            color: #ffffff;
            font-size: 1rem;
            line-height: 1.8;
            -ms-overflow-style: none; /* Hide scrollbar IE/Edge */
            animation: pageFadeIn 0.4s ease-in-out;
        }

        /* Hide scrollbar Chrome, Edge, Safari */
        ::-webkit-scrollbar {
            display: none;
        }

        /* =======================
           HEADER & NAVIGATION
        ======================= */
        header {
            width: 100%;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 90px;
            padding: 0 3%;
        }

        .left {
            display: flex;
            align-items: center;
        }

        .profileLink {
            display: flex;
            align-items: center;
            gap: 12px;
            color: inherit;
            text-decoration: none;
        }

        .left img {
            width: 46px;
            height: 46px;
            object-fit: cover;
            border-radius: 50%;
        }

        .profileText {
            display: flex;
            align-items: flex-end;
            height: 46px;
            padding-bottom: 2px;
        }

        .profileText span {
            font-family: "DM Mono", monospace;
            font-size: 0.78rem;
            color: #bcbcbc;
        }

        .right ul {
            display: flex;
            align-items: center;
            gap: 25px;
            list-style: none;
        }

        .right ul li a {
            color: #999;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .right ul li a:hover {
            color: #ffffff;
        }

        .right ul li a i {
            display: none;
        }

        /* =======================
           MAIN LAYOUT
        ======================= */
        main {
            flex: 1;
            width: min(700px, 80%);
            margin: auto;
        }

        section {
            margin: 50px 0;
        }

        /* =======================
           BLOG SECTION
        ======================= */
        .blogSection h1 {
            font-size: 2.2rem;
            font-weight: 750;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
        }

        .blogSubtitle {
            color: #888888; /* Darker/blacker gray subtitle */
            font-size: 0.92rem;
            line-height: 1.7;
            max-width: 520px;
            margin-top: -15px;
            margin-bottom: 35px;
            letter-spacing: 0.2px;
            font-family: "DM Mono", monospace;
        }

        .blogList {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Minimal Block Style Card (No Hover Background) */
        .blogPost {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 12px 0; /* Pure vertical padding, no background boxes */
            background-color: transparent;
        }

        .postLink {
            color: #ffffff; /* Bright Title Color strictly matching projects.html */
            text-decoration: none;
            font-size: 1.15rem;
            font-weight: 550;
            line-height: 1.4;
            transition: color 0.25s ease;
        }

        .postLink:hover {
            color: #bcbcbc; /* Soft interactive color on hover */
        }

        /* Custom Section Heading with a minimal line to fill space */
        .sectionHeader {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .sectionHeading {
            color: #cdcdcd;
            font-size: 1rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-family: "DM Mono", monospace;
        }

        .sectionLine {
            flex-grow: 1;
            border-bottom: 1px solid #1f1f1f; /* Soft minimal year divider */
            height: 1px;
        }

        /* =======================
           BLOG ACTION BUTTONS & META
        ======================= */
        .blogMeta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
        }

        .blogMeta p {
            color: #888888; /* Darker metadata gray */
            font-family: "DM Mono", monospace;
            font-size: 0.82rem;
        }

        .blogActions {
            display: flex;
            gap: 18px;
        }

        .blogActions a {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #555555; /* Quiet actions */
            text-decoration: none;
            font-family: "Inter", Arial, Helvetica, sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: color 0.25s ease;
        }

        .blogActions a i {
            font-size: 0.82rem;
        }

        .blogActions a:hover {
            color: #ffffff;
        }

        /* =======================
           FOOTER
        ======================= */
        .footerSection {
            width: min(700px, 80%);
            margin: auto;
            padding: 25px 0;
            border-top: 1px solid #262626;
        }

        .footer p {
            color: #cdcdcd;
            font-size: 0.9rem;
        }

        /* =======================
           BACK TO TOP BUTTON
        ======================= */
        .backToTop {
            position: fixed;
            right: 25px;
            bottom: 25px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #888;
            background: transparent;
            border-radius: 50%;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
            z-index: 9999;
        }

        .backToTop:hover {
            color: #ffffff;
            background: #161616e1;
        }

        .backToTop.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* =======================
           PAGE ANIMATION
        ======================= */
        @keyframes pageFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* =======================
           RESPONSIVE DESIGN
        ======================= */
        @media(max-width:768px) {
            nav {
                height: 80px;
                padding: 0 6%;
            }

            .profileText,
            .right ul li a span {
                display: none;
            }

            .left img {
                width: 42px;
                height: 42px;
            }

            .right ul {
                gap: 18px;
            }

            .right ul li a i {
                display: block;
                color: #999;
                font-size: 1.1rem;
                transition: color 0.3s ease;
            }

            .right ul li a:hover i {
                color: #ffffff;
            }

            main,
            .footerSection {
                width: 88%;
            }

            .pageSection h1 {
                font-size: 1.6rem;
            }

            .blogPost {
                padding: 12px 0;
                gap: 4px;
            }

            .postLink {
                font-size: 1.02rem;
            }

            .blogMeta p {
                font-size: 0.78rem;
            }

            .blogMeta {
                align-items: center;
            }

            .blogActions {
                gap: 14px;
            }

            .blogActions a {
                font-size: 0.85rem;
            }

            .blogActions a i {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <div id="top"></div>

    <header>
        <nav>
            <div class="left">
                <a href="index.html" class="profileLink">
                    <img src="https://github.com/shakibuzzaman52.png" alt="Profile">
                    <div class="profileText">
                        <span>shakibuzzaman52.me</span>
                    </div>
                </a>
            </div>
            <div class="right">
                <ul>
                    <li>
                        <a href="blog.html" title="Blog">
                            <i class="fa-regular fa-newspaper"></i>
                            <span>Blog</span>
                        </a>
                    </li>
                    <li>
                        <a href="projects.html" title="Projects">
                            <i class="fa-regular fa-folder"></i>
                            <span>Projects</span>
                        </a>
                    </li>
                    <li>
                        <a href="resources.html" title="Resources">
                            <i class="fa-regular fa-file-pdf"></i>
                            <span>Resources</span>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="blogSection">
            <h1>Blog</h1>
            <p class="blogSubtitle">
                My journey, thoughts, and experiences.
            </p>

            <div class="blogList">
                <!-- Section Header with minimal space-filling line -->
                <div class="sectionHeader">
                    <h2 class="sectionHeading">2026</h2>
                    <span class="sectionLine"></span>
                </div>
                
                <article class="blogPost">
                    <a class="postLink" href="articles/my-journey-into-competitive-programming.html">
                        My Journey into Competitive Programming
                    </a>

                    <div class="blogMeta">
                        <p>July 14, 2026</p>
                        <div class="blogActions">
                            <a class="readBtn">
                                <i class="fa-solid fa-book-open"></i>
                                Read
                            </a>
                            <a href="#" class="shareBtn">
                                <i class="fa-solid fa-share-nodes"></i>
                                Share
                            </a>
                        </div>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <footer class="footerSection">
        <div class="footer">
            <p>Thanks for visiting! Let's keep learning, creating and improving together.</p>
        </div>
    </footer>

    <a href="#" class="backToTop" id="backToTop">
        <i class="fa-solid fa-arrow-up"></i>
    </a>

    <script>
        // Back to top button visibility controller
        window.addEventListener("scroll", function () {
            const btn = document.getElementById("backToTop");
            if (window.scrollY > 50) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });

        // Back to top click handler
        document.getElementById("backToTop").onclick = function (e) {
            e.preventDefault();
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        };

        // Blog Post dynamic routing and social Web-Share APIs
        document.querySelectorAll(".blogPost").forEach(post => {
            const postLink = post.querySelector(".postLink");
            const readBtn = post.querySelector(".readBtn");
            const shareBtn = post.querySelector(".shareBtn");

            const link = postLink.href;
            const title = postLink.innerText;

            // Bind the active URL to Read elements
            readBtn.href = link;

            // Operational share system
            shareBtn.onclick = function (e) {
                e.preventDefault();
                if (navigator.share) {
                    navigator.share({
                        title: title,
                        text: "Read my blog post: " + title,
                        url: link
                    });
                } else {
                    navigator.clipboard.writeText(link);
                    alert("Link copied!");
                }
            };
        });
    </script>
</body>
</html>
