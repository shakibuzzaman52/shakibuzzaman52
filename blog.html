<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Shakib Uz Zaman</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

    <style>
        /* =======================
           RESET & BASE STYLES
        ======================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: "Inter", Arial, Helvetica, sans-serif;
            background-color: #050505;
            background-image: radial-gradient(#1f1f1f 1px, transparent 1px);
            background-size: 22px 22px;
            color: #ffffff;
            font-size: 1rem;
            line-height: 1.8;
        }

        /* =======================
           HEADER & NAV
        ======================= */
        header {
            width: 100%;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 90px;
            padding: 0 3%;
        }

        .left {
            display: flex;
            align-items: center;
        }

        .profileLink {
            display: flex;
            align-items: center;
            gap: 12px;
            color: inherit;
            text-decoration: none;
        }

        .left img {
            width: 46px;
            height: 46px;
            object-fit: cover;
            border-radius: 50%;
        }

        .profileText {
            display: flex;
            align-items: flex-end;
            height: 46px;
            padding-bottom: 2px;
        }

        .profileText span {
            font-family: "DM Mono", monospace;
            font-size: 0.78rem;
            color: #bcbcbc;
        }

        .right ul {
            display: flex;
            align-items: center;
            gap: 25px;
            list-style: none;
        }

        .right ul li a {
            color: #999;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .right ul li a:hover {
            color: #ffffff;
        }

        .right ul li a i {
            display: none;
        }

        /* =======================
           MAIN LAYOUT
        ======================= */
        main {
            flex: 1;
            width: min(700px, 80%);
            margin: auto;
        }

        section {
            margin: 50px 0;
        }

        /* =======================
           BLOG SECTION
        ======================= */
        .blogSection h1 {
            font-size: 2.2rem;
            font-weight: 750;
            letter-spacing: -0.5px;
            margin-bottom: 35px;
        }

        .blogList {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .blogPost {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .blogPost a {
            color: #b5b5b5;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .blogPost a:hover {
            color: #ffffff;
        }

        .blogPost p {
            color: #777;
            font-family: "DM Mono", monospace;
            font-size: 0.82rem;
        }

        /* =======================
           FOOTER
        ======================= */
        .footerSection {
            width: min(700px, 80%);
            margin: auto;
            padding: 25px 0;
            border-top: 1px solid #262626;
        }

        .footer p {
            color: #cdcdcd;
            font-size: 0.9rem;
        }

        /* =======================
           BACK TO TOP BUTTON
        ======================= */
        .backToTop {
            position: fixed;
            right: 25px;
            bottom: 25px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #888;
            background: transparent;
            border-radius: 50%;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
        }

        .backToTop:hover {
            color: #ffffff;
            background: #161616e1;
        }

        .backToTop.active {
            opacity: 1;
            pointer-events: auto;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #050505;
        }

        ::-webkit-scrollbar-thumb {
            background: #111111;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #222222;
        }

        /* =======================
           RESPONSIVE DESIGN
        ======================= */
        @media(max-width: 768px) {
            nav {
                height: 80px;
                padding: 0 6%;
            }

            .profileText,
            .right ul li a span {
                display: none;
            }

            .left img {
                width: 42px;
                height: 42px;
            }

            .right ul {
                gap: 18px;
            }

            .right ul li a i {
                display: block;
                color: #999;
                font-size: 1.1rem;
            }

            .right ul li a:hover i {
                color: #ffffff;
            }

            main,
            .footerSection {
                width: 88%;
            }

            .blogSection h1 {
                font-size: 1.6rem;
            }

            .blogPost a {
                font-size: 1rem;
            }

            .blogPost p {
                font-size: 0.78rem;
            }
        }
    </style>
</head>

<body>

    <div id="top"></div>

    <header>
        <nav>
            <div class="left">
                <a href="index.html" class="profileLink">
                    <img src="https://github.com/shakibuzzaman52.png" alt="Profile">
                    <div class="profileText">
                        <span>shakibuzzaman52.me</span>
                    </div>
                </a>
            </div>
            <div class="right">
                <ul>
                    <li>
                        <a href="blog.html" title="Blog">
                            <i class="fa-regular fa-newspaper"></i>
                            <span>Blog</span>
                        </a>
                    </li>
                    <li>
                        <a href="projects.html" title="Projects">
                            <i class="fa-regular fa-folder"></i>
                            <span>Projects</span>
                        </a>
                    </li>
                    <li>
                        <a href="resources.html" title="Resources">
                            <i class="fa-regular fa-file-pdf"></i>
                            <span>Resources</span>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="blogSection">
            <h1>Blog</h1>

            <div class="blogList">
                <article class="blogPost">
                    <a href="articles/my-journey-into-competitive-programming.html">
                        My Journey into Competitive Programming
                    </a>
                    <p>July 14, 2026</p>
                </article>

                <article class="blogPost">
                    <a href="articles/building-my-portfolio-website.html">
                        Building My Personal Portfolio Website
                    </a>
                    <p>July 10, 2026</p>
                </article>
            </div>
        </section>
    </main>

    <footer class="footerSection">
        <div class="footer">
            <p>Thanks for visiting! Let's keep learning, creating and improving together.</p>
        </div>
    </footer>

    <a href="#" class="backToTop" id="backToTop">
        <i class="fa-solid fa-arrow-up"></i>
    </a>

    <script>
        window.addEventListener("scroll", function () {
            const btn = document.getElementById("backToTop");
            if (window.scrollY > 50) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });

        document.getElementById("backToTop").onclick = function (e) {
            e.preventDefault();
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        };
    </script>
</body>

</html>
